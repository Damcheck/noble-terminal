name: 🔄 Cron — News (every 5m)
on:
  schedule:
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger /api/cron/news
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/cron/news" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Accept: application/json" || echo "News fetch failed (non-fatal)"
