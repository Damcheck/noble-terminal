name: 🔄 Cron — News (every 5m)
# Schedule disabled — handled by cron-job.org
on:
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger /api/cron/news
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/cron/news" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Accept: application/json" || echo "News fetch failed (non-fatal)"
