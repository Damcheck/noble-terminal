name: 🔄 Cron — Forex (every 5m)
on:
  schedule:
    - cron: '1,6,11,16,21,26,31,36,41,46,51,56 * * * *'
  workflow_dispatch:

jobs:
  fetch-forex:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger /api/cron/forex
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/cron/forex" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Accept: application/json" || echo "Forex fetch failed (non-fatal)"
